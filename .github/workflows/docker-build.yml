# docker-build — multi-arch DockerHub image build & push (KAC-127).
#
# Назначение: собирает Docker-образ kacho-ui под linux/amd64 + linux/arm64 и
# пушит multi-arch manifest в DockerHub. Дополняет (НЕ заменяет) `ci.yaml`,
# который гоняет type-check + build — этот workflow только собирает образы.
#
# kacho-ui — self-contained Vite + React SPA: Dockerfile (multi-stage
# node:22-alpine builder → nginx:1.27-alpine) копирует ТОЛЬКО собственные
# файлы репо. Build context = `.` (siblings НЕ нужны, в отличие от Go-сервисов).
#
# Образ: kacho-ui (nginx, serves SPA + reverse-proxy на api-gateway).
#
# ─── Требуемые GitHub secrets ────────────────────────────────────────────
# DOCKERHUB_USERNAME — Docker Hub username (он же namespace для образов).
# DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write/Delete scope).
# Установка (user-action; креды одинаковые на все kacho-* репо):
#   gh secret set DOCKERHUB_USERNAME --body "<value>" --repo PRO-Robotech/kacho-ui
#   gh secret set DOCKERHUB_TOKEN    --body "<value>" --repo PRO-Robotech/kacho-ui
#
# Когда секреты НЕ заданы (напр. форк или ещё не сконфигуренный репо) — образ
# всё равно собирается (валидация Dockerfile), но login + push пропускаются;
# multiarch-manifest job в этом случае тоже no-op. Это держит CI зелёным до
# того, как user пропишет креды.
#
# Tags: <branch>-<sha8> (combined multiarch), amd64-<branch>-<sha8>,
#       arm64-<branch>-<sha8> (per-arch промежуточные).

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

env:
  IMAGE_NAME: kacho-ui

jobs:
  docker-build-amd64:
    name: build amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      # Push only when DockerHub creds are configured. Without them the build
      # still runs (Dockerfile validation) but does not attempt a registry push.
      - name: Detect DockerHub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME not set — building image without registry push."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-amd64-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-amd64-

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.creds.outputs.push == 'true' }}
          provenance: false
          platforms: linux/amd64
          tags: ${{ steps.creds.outputs.push == 'true' && format('{0}/{1}:amd64-{2}-{3}', secrets.DOCKERHUB_USERNAME, env.IMAGE_NAME, steps.sanitize.outputs.branch, steps.short-sha.outputs.sha) || format('{0}:amd64-ci', env.IMAGE_NAME) }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  docker-build-arm64:
    name: build arm64
    # GitHub-hosted native ARM64 runner (KAC-127): убирает зависимость от
    # self-hosted инфраструктуры (offline/busy раннер вешал job в pending).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Detect DockerHub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME not set — building image without registry push."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ubuntu-24.04-arm — native arm64, QEMU-эмуляция для linux/arm64 не нужна.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-arm64-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-arm64-

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.creds.outputs.push == 'true' }}
          provenance: false
          platforms: linux/arm64
          tags: ${{ steps.creds.outputs.push == 'true' && format('{0}/{1}:arm64-{2}-{3}', secrets.DOCKERHUB_USERNAME, env.IMAGE_NAME, steps.sanitize.outputs.branch, steps.short-sha.outputs.sha) || format('{0}:arm64-ci', env.IMAGE_NAME) }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  docker-multiarch-push:
    name: multiarch manifest push
    runs-on: ubuntu-latest
    needs: [docker-build-amd64, docker-build-arm64]
    steps:
      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      - name: Detect DockerHub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME not set — skipping multiarch manifest push."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multiarch manifest
        if: steps.creds.outputs.push == 'true'
        run: |
          IMG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.sanitize.outputs.branch }}-${{ steps.short-sha.outputs.sha }}"
          docker manifest create  "$IMG:$TAG" "$IMG:amd64-$TAG" "$IMG:arm64-$TAG"
          docker manifest annotate "$IMG:$TAG" "$IMG:amd64-$TAG" --arch amd64 --os linux
          docker manifest annotate "$IMG:$TAG" "$IMG:arm64-$TAG" --arch arm64 --os linux
          docker manifest push    "$IMG:$TAG"
