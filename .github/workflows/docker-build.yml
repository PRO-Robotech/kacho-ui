# docker-build — multi-arch DockerHub image build & push (KAC-127).
#
# Назначение: собирает Docker-образ kacho-ui под linux/amd64 + linux/arm64 и
# пушит multi-arch manifest в DockerHub. Дополняет (НЕ заменяет) `ci.yaml`.
#
# kacho-ui — self-contained Vite + React SPA: Dockerfile (multi-stage
# node:22-alpine builder → nginx:1.27-alpine) копирует ТОЛЬКО собственные
# файлы репо. Build context = `.` (siblings НЕ нужны, в отличие от Go-сервисов).
#
# ─── Почему ОДНА job, а не per-arch + manifest-combine ───────────────────
# manifest-combine (`docker manifest create`) перечитывает (pull!) per-arch
# манифесты из docker.io → падал с `toomanyrequests`, когда pull-бюджет
# DockerHub-аккаунта исчерпан (newman-e2e kind тянет ~15 docker.io-образов на
# прогон). ОДИН `buildx build --platform linux/amd64,linux/arm64 --push`
# собирает обе платформы и пушит ОДИН index напрямую — НИ ОДНОГО docker.io-pull
# (base с mirror.gcr.io, buildkit/binfmt с mirror.gcr.io, push не считается).
# Dockerfile pinит build-stage на $BUILDPLATFORM → тяжёлый `npm run build` идёт
# нативно (Vite-вывод arch-agnostic), под QEMU — только крошечный nginx-слой.
#
# ─── Требуемые GitHub secrets ────────────────────────────────────────────
# DOCKERHUB_USERNAME — Docker Hub username (он же namespace для образов).
# DOCKERHUB_TOKEN    — Docker Hub access token (Read/Write/Delete scope).
#
# Когда секреты НЕ заданы (форк / ещё не сконфигуренный репо) — образ всё равно
# собирается (валидация Dockerfile), но login + push пропускаются. Это держит
# CI зелёным до того, как user пропишет креды.
#
# Tags: <branch>-<sha8> (multiarch index).

name: docker-build

on:
  push:
    branches:
      - main
      - "KAC-*"
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

permissions:
  contents: read

env:
  IMAGE_NAME: kacho-ui

jobs:
  docker-build:
    name: build & push multiarch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha
        with: { length: 8 }

      - name: Create sanitized branch name
        id: sanitize
        run: echo "branch=$(echo "${GITHUB_REF_NAME}" | sed 's/\//-/g')" >> "$GITHUB_OUTPUT"

      # Push only when DockerHub creds are configured. Without them the build
      # still runs (Dockerfile validation) but does not attempt a registry push.
      - name: Detect DockerHub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DOCKERHUB_USERNAME not set — building image without registry push."
          fi

      - name: Login to Docker Hub
        if: steps.creds.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Enable QEMU emulation
        uses: docker/setup-qemu-action@v3
        with:
          # binfmt from a mirror — keeps the DockerHub pull budget free.
          image: mirror.gcr.io/tonistiigi/binfmt:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # buildkit from a mirror, not docker.io.
          driver-opts: image=mirror.gcr.io/moby/buildkit:buildx-stable-1

      - name: Configure Buildx cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push (multiarch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.creds.outputs.push == 'true' }}
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.creds.outputs.push == 'true' && format('{0}/{1}:{2}-{3}', secrets.DOCKERHUB_USERNAME, env.IMAGE_NAME, steps.sanitize.outputs.branch, steps.short-sha.outputs.sha) || format('{0}:ci', env.IMAGE_NAME) }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move new cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true
