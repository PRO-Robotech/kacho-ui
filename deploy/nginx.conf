server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: все route-ы отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy: /v1/* → api-gateway:8080
    location /v1/ {
        proxy_pass http://api-gateway.kacho.svc.cluster.local:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $http_x_request_id;
        # Watch streams: отключаем буферизацию + длинный timeout
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Disable cache for index.html (для деплоя)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Long cache для assets с hash в имени
    location ~* \.(js|css|svg|png|jpg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
